# fly.toml app configuration file generated for neo-weuu9q on 2026-04-29T05:44:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neo-weuu9q'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.production'

[env]
  AUTH_MODE = 'oauth'
  PORT = '8080'
  SERVE_STATIC = 'true'
  STATIC_DIR = '/app/static'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

app = "neo"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.production"

[env]
  PORT = "8080"
  SERVE_STATIC = "true"
  STATIC_DIR = "/app/static"
  AUTH_MODE = "basic"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

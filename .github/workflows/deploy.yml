name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment credentials
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::FLY_API_TOKEN secret is not set."
            echo ""
            echo "To enable deployment:"
            echo "  1. Install flyctl: https://fly.io/docs/flyctl/install/"
            echo "  2. Run: fly tokens create deploy -x 999999h"
            echo "  3. Add the token as a repository secret named FLY_API_TOKEN"
            echo "     Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
